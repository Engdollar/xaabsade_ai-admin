name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Runner iOS project with xcodebuild
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Flutter dependencies
        working-directory: .
        run: flutter pub get
      - name: Install CocoaPods dependencies
        run: pod install --repo-update
      - name: Verify iOS project files
        run: |
          test -d Runner.xcodeproj
          test -d Runner.xcworkspace
          test -f Flutter/Generated.xcconfig
          xcodebuild -list -workspace Runner.xcworkspace
      - name: Build
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build
